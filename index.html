<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPF/VPF vs SIP Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-card">
        <h2>PPF/VPF vs SIP Calculator</h2>

        <div class="input-group">
            <label for="contribution">Monthly Contribution (₹)</label>
            <input type="text" id="contribution" inputmode="numeric" placeholder="e.g. 10,000">
        </div>

        <!-- Buttons moved below first input -->
        <div class="toggle-container">
            <button id="ppfBtn" class="toggle-btn active" onclick="setMode('PPF')">
                PPF (7.1%)
            </button>
            <button id="vpfBtn" class="toggle-btn" onclick="setMode('VPF')">
                VPF (8.25%)
            </button>
        </div>

        <div class="input-group">
            <label for="sipRate">Expected SIP Returns (% p.a.)</label>
            <input type="text" id="sipRate" inputmode="numeric" placeholder="e.g. 12">
        </div>
        
        <div id="error-message" style="color: #d9534f; font-size: 0.9rem; margin-bottom: 10px; display: none; text-align: center; font-weight: bold;">
            This value cannot be less than 10.
        </div>

        <div class="input-group">
            <label for="years">Time Period (in Years)</label>
            <input type="text" id="years" inputmode="numeric" placeholder="e.g. 15">
        </div>

        <button class="calc-btn" onclick="calculate()"><b>Compare</b></button>

        <div class="results" id="results" style="display: none;">
            <div class="result-item" id="debtMaturityRow">
                <span id="debtLabel">PPF Maturity:</span>
                <span id="debtResult">₹0</span>
            </div>
            <div class="result-item" id="sipMaturityRow">
                <span>SIP Maturity:</span>
                <span id="sipResult">₹0</span>
            </div>
            <div class="result-item total" id="wealthGainedRow">
                <span>Extra Wealth Gained:</span>
                <span id="wealthGained">₹0</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
